name: Code Review (严审)

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Get PR diff
        id: diff
        run: |
          # 获取 PR 的变更文件列表
          git diff --name-only origin/main...HEAD > changed-files.txt
          echo "files<<EOF" >> $GITHUB_OUTPUT
          cat changed-files.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          # 获取 diff 统计
          echo "stats<<EOF" >> $GITHUB_OUTPUT
          git diff --stat origin/main...HEAD >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Analyze code changes
        id: analysis
        run: |
          # 创建分析报告
          cat > analysis.md << 'MARKDOWN'
          ## 🔍 严审 Code Review Report
          
          **PR**: #${{ github.event.pull_request.number }}
          **Author**: ${{ github.event.pull_request.user.login }}
          **Branch**: ${{ github.head_ref }}
          
          ### 📊 变更统计
          ```
          ${{ steps.diff.outputs.stats }}
          ```
          
          ### 📁 变更文件
          <details>
          <summary>点击查看文件列表</summary>
          
          ```
          ${{ steps.diff.outputs.files }}
          ```
          </details>
          
          ### ✅ 检查清单
          
          #### 1. 代码质量
          - [ ] 代码风格一致性
          - [ ] 命名规范
          - [ ] 注释和文档
          - [ ] 无重复代码
          
          #### 2. 安全性
          - [ ] 无 XSS 漏洞
          - [ ] 无敏感信息泄露
          - [ ] 输入验证完善
          - [ ] 权限检查
          
          #### 3. 测试覆盖
          - [ ] 单元测试充分
          - [ ] 边界条件覆盖
          - [ ] 集成测试
          - [ ] E2E 测试（如适用）
          
          #### 4. 架构设计
          - [ ] 模块职责清晰
          - [ ] 依赖关系合理
          - [ ] 无循环依赖
          - [ ] 接口设计合理
          
          ### 🎯 审查结论
          
          **状态**: ✅ 通过 / ⚠️ 需修改 / ❌ 阻止合并
          
          **说明**: 
          此为自动化审查，建议安老师最终确认。
          
          ---
          *Generated by 严审 (Code Review Agent) - OpenClaw*
          MARKDOWN
          
          echo "report<<EOF" >> $GITHUB_OUTPUT
          cat analysis.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run automated checks
        id: checks
        run: |
          # 运行 TypeScript 类型检查
          echo "## TypeScript 类型检查" >> analysis.md
          if pnpm build:server; then
            echo "✅ 类型检查通过" >> analysis.md
            echo "typecheck=pass" >> $GITHUB_OUTPUT
          else
            echo "❌ 类型检查失败" >> analysis.md
            echo "typecheck=fail" >> $GITHUB_OUTPUT
          fi
          
          # 运行测试
          echo "" >> analysis.md
          echo "## 测试结果" >> analysis.md
          if pnpm test; then
            echo "✅ 测试通过" >> analysis.md
            echo "test=pass" >> $GITHUB_OUTPUT
          else
            echo "❌ 测试失败" >> analysis.md
            echo "test=fail" >> $GITHUB_OUTPUT
          fi
          
          # 代码格式检查
          echo "" >> analysis.md
          echo "## 代码格式" >> analysis.md
          if npx prettier --check "src/**/*.{ts,tsx}" "tests/**/*.{ts,tsx}" 2>/dev/null; then
            echo "✅ 格式检查通过" >> analysis.md
            echo "format=pass" >> $GITHUB_OUTPUT
          else
            echo "⚠️ 格式需要调整" >> analysis.md
            echo "format=warn" >> $GITHUB_OUTPUT
          fi

      - name: Determine result
        id: result
        run: |
          # 判断最终结果
          TYPECHECK="${{ steps.checks.outputs.typecheck }}"
          TEST="${{ steps.checks.outputs.test }}"
          
          if [ "$TYPECHECK" = "fail" ] || [ "$TEST" = "fail" ]; then
            echo "conclusion=failure" >> $GITHUB_OUTPUT
            echo "status=❌ 阻止合并" >> $GITHUB_OUTPUT
            echo "" >> analysis.md
            echo "## 最终结论" >> analysis.md
            echo "**❌ 阻止合并** - 存在必须修复的问题" >> analysis.md
          elif [ "$TYPECHECK" = "pass" ] && [ "$TEST" = "pass" ]; then
            echo "conclusion=success" >> $GITHUB_OUTPUT
            echo "status=✅ 通过" >> $GITHUB_OUTPUT
            echo "" >> analysis.md
            echo "## 最终结论" >> analysis.md
            echo "**✅ 通过** - 建议合并" >> analysis.md
          else
            echo "conclusion=neutral" >> $GITHUB_OUTPUT
            echo "status=⚠️ 需人工审查" >> $GITHUB_OUTPUT
            echo "" >> analysis.md
            echo "## 最终结论" >> analysis.md
            echo "**⚠️ 需人工审查** - 建议安老师最终确认" >> analysis.md
          fi

      - name: Create Check Run
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('analysis.md', 'utf8');
            
            const check = await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: '严审 Code Review',
              head_sha: context.payload.pull_request.head.sha,
              status: 'completed',
              conclusion: '${{ steps.result.outputs.conclusion }}',
              output: {
                title: '${{ steps.result.outputs.status }}',
                summary: report,
                annotations: []
              }
            });
            
            console.log('Check Run created:', check.data.id);

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('analysis.md', 'utf8');
            
            // 查找是否已有严审评论
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            
            const botComment = comments.data.find(comment => 
              comment.body.includes('严审 Code Review Report')
            );
            
            if (botComment) {
              // 更新现有评论
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: report
              });
            } else {
              // 创建新评论
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: report
              });
            }

      - name: Fail if checks failed
        if: steps.result.outputs.conclusion == 'failure'
        run: exit 1
